name: release

# Fire only on semver tags like v1.2.3.
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write # create GitHub releases + upload assets
  packages: write # push container image to GHCR

env:
  IMAGE_NAME: tsp

jobs:
  # ---------------------------------------------------------------------------
  # Build & push the troubleshooting-pod container image.
  # Publishes ONLY the exact version tag (1.2.3) — never 1, 1.2, or latest.
  # ---------------------------------------------------------------------------
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image repo
        id: repo
        run: echo "value=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.repo.outputs.value }}
          # latest=false disables the implicit :latest tag.
          flavor: latest=false
          # {{version}} is the full semver (1.2.3) with no partial (1 / 1.2) tags.
          tags: type=semver,pattern={{version}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ---------------------------------------------------------------------------
  # Build the kubectl-tsp plugin at the SAME version via GoReleaser: publishes
  # archives + checksums to the GitHub release and pushes the Homebrew cask.
  # (Installing via brew de-quarantines the binary — no macOS Gatekeeper prompt.)
  # ---------------------------------------------------------------------------
  plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # GoReleaser needs full history + tags

      - uses: actions/setup-go@v5
        with:
          go-version-file: plugin/go.mod
          cache-dependency-path: plugin/go.sum

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          # Publishes the release to this repo.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with write access to cudneys/homebrew-tap (see README).
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
