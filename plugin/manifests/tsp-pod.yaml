apiVersion: v1
kind: Pod
metadata:
  name: tsp
  labels:
    app: tsp
    app.kubernetes.io/managed-by: kubectl-tsp
spec:
  # Tolerate common control-plane / tainted nodes so you can debug anywhere.
  tolerations:
    - operator: Exists
  containers:
    - name: tsp
      # Image repo/tag are overridden by the plugin at deploy time.
      image: PLACEHOLDER
      imagePullPolicy: IfNotPresent
      command: ["sleep", "infinity"]
      env:
        # Downward API: surface pod identity to the login banner.
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
      securityContext:
        capabilities:
          # NET_RAW   -> tcpdump/tshark/nmap raw sockets, ping
          # NET_ADMIN -> manipulate routes, interfaces, nftables
          add: ["NET_RAW", "NET_ADMIN"]
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 500m
          memory: 256Mi
  restartPolicy: Never
